<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>{{ slide.title | e }}</title>
<style>
  /* ── 字体栈 ─────────────────────────────────────────────
     macOS: PingFang SC（系统原生）
     Linux: Noto Sans CJK SC / Noto Serif CJK SC
     Windows: Microsoft YaHei
     兜底: 无衬线
  */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1440px;
    overflow: hidden;
    font-family: "PingFang SC", "Hiragino Sans GB",
                 "Noto Sans CJK SC", "Noto Sans CJK",
                 "Microsoft YaHei", "微软雅黑",
                 sans-serif;
    /* viewport 由调用方注入；这里给一个安全 fallback */
  }
  .card {
    width: 1080px;
    height: 1440px;
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 96px 80px;
    color: #1a1a1a;
  }
  /* ── 三种类型差异化排版 ─────────────────────────────── */
  .type-cover {
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #c44536 100%);
    color: #f8f8f2;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .type-cover .label {
    font-size: 36px;
    letter-spacing: 12px;
    color: #ffd166;
    margin-bottom: 60px;
    font-weight: 500;
  }
  .type-cover .title {
    font-family: "Noto Serif CJK SC", "Songti SC", "STSong",
                 "Source Han Serif SC", "PingFang SC", serif;
    font-size: 120px;
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: 4px;
    text-shadow: 0 4px 16px rgba(0,0,0,0.4);
    margin-bottom: 80px;
  }
  .type-cover .body {
    font-size: 44px;
    line-height: 1.7;
    opacity: 0.92;
    max-width: 880px;
  }
  .type-content {
    background: #fdfaf6;
    color: #1a1a1a;
  }
  .type-content .label {
    font-size: 28px;
    color: #c44536;
    letter-spacing: 6px;
    margin-bottom: 36px;
    font-weight: 600;
  }
  .type-content .title {
    font-family: "Noto Serif CJK SC", "Songti SC", "STSong",
                 "Source Han Serif SC", "PingFang SC", serif;
    font-size: 96px;
    font-weight: 700;
    line-height: 1.2;
    color: #16213e;
    margin-bottom: 56px;
    border-left: 8px solid #c44536;
    padding-left: 32px;
  }
  .type-content .body {
    font-size: 52px;
    line-height: 1.8;
    color: #2d2d2d;
    flex: 1;
    display: flex;
    align-items: flex-start;
  }
  .type-content .body p {
    max-width: 920px;
  }
  .type-action {
    background: #16213e;
    color: #f8f8f2;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  .type-action .label {
    font-size: 32px;
    color: #ffd166;
    letter-spacing: 8px;
    margin-bottom: 48px;
  }
  .type-action .title {
    font-family: "Noto Serif CJK SC", "Songti SC", "STSong", serif;
    font-size: 108px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 64px;
    color: #ffd166;
  }
  .type-action .body {
    font-size: 48px;
    line-height: 1.7;
    opacity: 0.92;
  }
  /* 页脚小标 */
  .footer {
    position: absolute;
    bottom: 48px;
    left: 80px;
    right: 80px;
    font-size: 24px;
    color: rgba(0,0,0,0.4);
    display: flex;
    justify-content: space-between;
    letter-spacing: 4px;
  }
  .type-cover .footer, .type-action .footer {
    color: rgba(255,255,255,0.6);
  }
</style>
</head>
<body class="type-{{ slide.type }}">
  <div class="card type-{{ slide.type }}">
    {% if slide.type == "cover" %}
      <div class="label">媒 体 · 观 察</div>
    {% elif slide.type == "content" %}
      <div class="label">观 点</div>
    {% elif slide.type == "action" %}
      <div class="label">END · 互 动</div>
    {% endif %}

    <div class="title">{{ slide.title | e }}</div>
    <div class="body"><p>{{ slide.body | e }}</p></div>

    <div class="footer">
      <span>MediaForge</span>
      <span>{{ slide.type | upper }}</span>
    </div>
  </div>
</body>
</html>
