{% extends "base.html" %}
{% block title %}设置 · MediaForge{% endblock %}
{% block content %}
<h1>设置</h1>
{% if err %}
    <div role="alert" class="alert error">配置加载失败：{{ err }}</div>
{% else %}
    <p>以下展示当前 config（敏感字段已脱敏为 <code>***</code>）。</p>
    <pre><code>{{ config | tojson(indent=2) }}</code></pre>
{% endif %}
{% endblock %}
