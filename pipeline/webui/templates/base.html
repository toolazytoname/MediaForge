<!doctype html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <title>{% block title %}MediaForge{% endblock %}</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        nav a { margin-right: 1rem; }
        table { font-size: 0.9rem; }
        .badge { padding: 0.2rem 0.5rem; border-radius: 4px;
                 background: #eee; font-size: 0.85rem; }
        .badge.ok { background: #4ade80; color: white; }
        .badge.rejected { background: #f87171; color: white; }
        .alert.error { background: #fee; border: 1px solid #fcc;
                       padding: 0.5rem; margin: 0.5rem 0; }
    </style>
</head>
<body>
    <nav class="container">
        <a href="/"><strong>MediaForge</strong></a>
        <a href="/topics?status=scored">选题池</a>
        <a href="/review">审核台</a>
        <a href="/calendar">发布日历</a>
        <a href="/settings">设置</a>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
